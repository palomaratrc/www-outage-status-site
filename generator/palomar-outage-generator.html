<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palomar College — Outage Page Generator</title>
  <style>
    :root {
      --color-red: #e9171f;
      --color-silver: #b4babc;
      --color-gold: #fed184;
      --color-black: #000000;
      --color-white: #ffffff;
      --color-bg: #f4f4f4;
      --color-text: #1a1a1a;
      --color-success: #1a7a3a;
      --font-stack: "Gill Sans", "Gill Sans MT", Arial, Helvetica, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-stack);
      font-size: 1rem;
      line-height: 1.6;
      color: var(--color-text);
      background-color: var(--color-bg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    :focus-visible {
      outline: 3px solid var(--color-gold);
      outline-offset: 3px;
    }

    /* ===== GENERATOR HEADER ===== */
    .gen-header {
      background-color: var(--color-red);
      color: var(--color-white);
      padding: 1.25rem 2rem;
      flex-shrink: 0;
    }

    .gen-header__title {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 900;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .gen-header__subtitle {
      font-size: 1.1rem;
      font-weight: 600;
      margin-top: 0.15rem;
      opacity: 0.95;
    }

    .gen-header__desc {
      font-size: 0.9rem;
      margin-top: 0.25rem;
      opacity: 0.82;
    }

    /* ===== APP LAYOUT ===== */
    .app-layout {
      display: flex;
      flex: 1;
      align-items: flex-start;
      overflow: hidden;
    }

    /* ===== FORM PANEL ===== */
    .panel-form {
      flex: 0 0 40%;
      background: var(--color-white);
      border-right: 2px solid var(--color-silver);
      overflow-y: auto;
      height: calc(100vh - 105px);
      display: flex;
      flex-direction: column;
    }

    .panel-form form {
      padding: 1.25rem 1.25rem 0;
      flex: 1;
    }

    /* ===== PREVIEW PANEL ===== */
    .panel-preview {
      flex: 1;
      position: sticky;
      top: 0;
      height: calc(100vh - 105px);
      display: flex;
      flex-direction: column;
      background: #ddd;
    }

    .preview-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 1rem;
      background: #c8c8c8;
      border-bottom: 1px solid #aaa;
      flex-shrink: 0;
    }

    .preview-toolbar__label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #444;
    }

    .btn-refresh {
      font-size: 0.8rem;
      padding: 0.25rem 0.7rem;
      background: var(--color-white);
      border: 1px solid #999;
      border-radius: 4px;
      cursor: pointer;
      font-family: var(--font-stack);
      color: var(--color-text);
    }

    .btn-refresh:hover { background: var(--color-bg); }

    #preview-frame {
      flex: 1;
      border: none;
      width: 100%;
      background: white;
    }

    /* ===== FIELDSETS & FORM CONTROLS ===== */
    fieldset {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.9rem 1rem;
      margin-bottom: 1rem;
    }

    legend {
      font-size: 0.85rem;
      font-weight: 700;
      color: #555;
      padding: 0 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-group {
      margin-bottom: 0.75rem;
    }

    .form-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.25rem;
    }

    input[type="text"],
    input[type="url"],
    input[type="email"],
    input[type="datetime-local"],
    textarea {
      width: 100%;
      padding: 0.4rem 0.6rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: var(--font-stack);
      font-size: 0.9rem;
      color: var(--color-text);
      background: var(--color-white);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-red);
      box-shadow: 0 0 0 3px rgba(233, 23, 31, 0.12);
    }

    textarea { resize: vertical; min-height: 72px; }

    /* ===== RADIO GROUP ===== */
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .radio-group label {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      margin: 0;
    }

    .radio-group input[type="radio"] { flex-shrink: 0; }

    /* ===== CHECKBOX LIST ===== */
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .checkbox-item:last-child { border-bottom: none; }

    .checkbox-item label {
      margin: 0;
      font-weight: 400;
      font-size: 0.88rem;
      cursor: pointer;
      flex: 1;
    }

    .checkbox-item input[type="checkbox"] {
      flex-shrink: 0;
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: var(--color-red);
    }

    .link-remove-btn {
      background: none;
      border: none;
      color: #bbb;
      font-size: 0.95rem;
      cursor: pointer;
      padding: 0 0.2rem;
      line-height: 1;
      flex-shrink: 0;
    }

    .link-remove-btn:hover { color: var(--color-red); }

    /* ===== ADD CUSTOM LINK ===== */
    .add-link-section {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px dashed #ccc;
    }

    .add-link-section p {
      font-size: 0.8rem;
      font-weight: 700;
      color: #555;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .add-link-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.35rem;
      margin-bottom: 0.35rem;
    }

    .btn-add-link {
      width: 100%;
      padding: 0.35rem 0.5rem;
      background: var(--color-bg);
      border: 1px solid #ccc;
      border-radius: 4px;
      font-family: var(--font-stack);
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--color-text);
      font-weight: 600;
    }

    .btn-add-link:hover { background: #e0e0e0; }

    /* ===== RESTORATION TIME (conditional) ===== */
    #restoration-group { display: none; }
    #restoration-group.visible { display: block; }

    /* ===== CONTACT BLOCKS ===== */
    .contact-block + .contact-block {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
    }

    .contact-block-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .contact-block-header span {
      font-size: 0.8rem;
      font-weight: 700;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .inline-check-label {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--color-text);
    }

    .inline-check-label input[type="checkbox"] {
      accent-color: var(--color-red);
    }

    /* ===== ACTION BUTTONS ===== */
    .action-buttons {
      padding: 1rem 1.25rem 1.5rem;
      background: var(--color-white);
      border-top: 1px solid #eee;
      flex-shrink: 0;
    }

    .btn-download {
      display: block;
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--color-red);
      color: var(--color-white);
      border: none;
      border-radius: 6px;
      font-family: var(--font-stack);
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s;
    }

    .btn-download:hover { background: #c0121a; }

    .btn-copy {
      display: block;
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.55rem 1rem;
      background: var(--color-white);
      color: var(--color-text);
      border: 2px solid var(--color-silver);
      border-radius: 6px;
      font-family: var(--font-stack);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.15s;
    }

    .btn-copy:hover { border-color: #888; }

    .success-msg {
      display: none;
      padding: 0.55rem 0.9rem;
      margin-top: 0.5rem;
      background: #d4edda;
      border: 1px solid #28a745;
      border-radius: 5px;
      color: #155724;
      font-size: 0.88rem;
      font-weight: 600;
    }

    .success-msg.visible { display: block; }

    /* ===== HELPER TEXT ===== */
    .hint {
      font-size: 0.78rem;
      color: #888;
      margin-top: 0.2rem;
    }

    .req { color: var(--color-red); margin-left: 0.15rem; }

    /* ===== MOBILE ===== */
    @media (max-width: 900px) {
      .app-layout {
        flex-direction: column;
        overflow: visible;
      }

      .panel-form {
        flex: none;
        height: auto;
        overflow-y: visible;
        border-right: none;
        border-bottom: 2px solid var(--color-silver);
      }

      .panel-preview {
        position: static;
        height: 60vw;
        min-height: 400px;
        width: 100%;
      }
    }
  </style>
</head>
<body>

<!--
  ============================================================
  PALOMAR COLLEGE OUTAGE PAGE GENERATOR
  ============================================================
  This tool generates index.html for the palomar-outage-page
  GitHub repository (or equivalent outage status repo).

  TO DEPLOY A GENERATED PAGE:
  1. Fill out the form and click "Download index.html"
  2. Push the downloaded file to the main branch of the
     palomar-outage-page GitHub repository
  3. The existing GitHub Actions workflow will automatically
     deploy it to Azure Static Web Apps

  TO HOST THIS GENERATOR:
  Drop this file in any GitHub repo with GitHub Pages enabled
  (Settings → Pages → Source: main branch / root or /generator).
  No build tools, no dependencies — open in any browser.
  ============================================================
-->

<header class="gen-header" role="banner">
  <p class="gen-header__title">Palomar College</p>
  <p class="gen-header__subtitle">Outage Page Generator</p>
  <p class="gen-header__desc">Configure and download a status page to deploy during palomar.edu outages.</p>
</header>

<div class="app-layout">

  <!-- ==================== LEFT: FORM ==================== -->
  <div class="panel-form" role="main" id="form-panel">
    <form id="gen-form" novalidate>

      <!-- ── SECTION 1: STATUS ── -->
      <fieldset>
        <legend>1 — Status</legend>

        <div class="form-group">
          <label>Status Type <span class="req" aria-hidden="true">*</span></label>
          <div class="radio-group" role="group" aria-label="Status type" aria-required="true">
            <label>
              <input type="radio" name="status-type" value="active-outage" checked>
              🔴 Active Outage
            </label>
            <label>
              <input type="radio" name="status-type" value="scheduled-maintenance">
              🟡 Scheduled Maintenance
            </label>
            <label>
              <input type="radio" name="status-type" value="service-restored">
              🟢 Service Restored
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="status-headline">Status Headline</label>
          <input type="text" id="status-headline" name="status-headline"
                 value="Website Temporarily Unavailable">
          <p class="hint">Auto-fills from status type. Override as needed.</p>
        </div>

        <div class="form-group">
          <label for="status-message">Status Message</label>
          <textarea id="status-message" name="status-message" rows="4">We are aware of an issue affecting palomar.edu and are working to restore service. Essential resources are available below.</textarea>
        </div>

        <div class="form-group">
          <label for="last-updated">Last Updated <span class="req" aria-hidden="true">*</span></label>
          <input type="datetime-local" id="last-updated" name="last-updated" aria-required="true">
        </div>

        <div class="form-group">
          <label for="contact-line">Contact for Questions</label>
          <input type="text" id="contact-line" name="contact-line"
                 value="Information Services Help Desk — helpdesk@palomar.edu or (760) 744-1150, ext. 2140">
        </div>

        <div class="form-group" id="restoration-group">
          <label for="restoration-time">Estimated Restoration Time <span style="font-weight:400;color:#888;">(optional)</span></label>
          <input type="text" id="restoration-time" name="restoration-time"
                 placeholder="e.g., 3:00 PM today, Wednesday June 25">
        </div>

      </fieldset>

      <!-- ── SECTION 2: QUICK LINKS ── -->
      <fieldset>
        <legend>2 — Quick Links</legend>
        <p class="hint" style="margin-bottom:0.5rem;">Uncheck to exclude from generated page.</p>

        <div id="quick-links-list"></div>

        <div class="add-link-section">
          <p>Add Custom Link</p>
          <div class="add-link-grid">
            <div>
              <label for="new-label" style="font-size:0.75rem;">Label</label>
              <input type="text" id="new-label" placeholder="Link name">
            </div>
            <div>
              <label for="new-url" style="font-size:0.75rem;">URL</label>
              <input type="url" id="new-url" placeholder="https://">
            </div>
          </div>
          <div style="margin-bottom:0.35rem;">
            <label for="new-desc" style="font-size:0.75rem;display:block;margin-bottom:0.2rem;">Description <span style="font-weight:400;color:#888;">(optional)</span></label>
            <input type="text" id="new-desc" placeholder="Brief description">
          </div>
          <button type="button" class="btn-add-link" id="btn-add-link">+ Add Link</button>
        </div>

      </fieldset>

      <!-- ── SECTION 3: NEED HELP? ── -->
      <fieldset>
        <legend>3 — Need Help?</legend>

        <div class="form-group">
          <label class="inline-check-label" style="font-size:0.88rem;">
            <input type="checkbox" id="show-contact" checked style="accent-color:var(--color-red);">
            Show "Need Help?" section
          </label>
        </div>
        <div class="form-group">
          <label for="help-center-url">Help Center URL</label>
          <input type="url" id="help-center-url" value="https://help.palomar.edu">
        </div>

      </fieldset>

      <!-- ── SECTION 4: OPTIONS ── -->
      <fieldset>
        <legend>4 — Options</legend>

        <div class="form-group">
          <label class="inline-check-label" style="font-size:0.88rem;">
            <input type="checkbox" id="show-locations" checked style="accent-color:var(--color-red);">
            Show Campus Locations section
          </label>
        </div>

        <div class="form-group">
          <label for="page-title">Page Title (browser tab)</label>
          <input type="text" id="page-title" value="Palomar College — Website Status">
        </div>

        <div class="form-group">
          <label for="footer-note">Footer Note</label>
          <input type="text" id="footer-note"
                 value="This is a temporary status page. Visit palomar.edu when service is restored.">
        </div>

      </fieldset>

    </form>

    <!-- ── ACTION BUTTONS ── -->
    <div class="action-buttons">
      <button type="button" class="btn-download" id="btn-download">
        ⬇ Download index.html
      </button>
      <button type="button" class="btn-copy" id="btn-copy">
        📋 Copy HTML
      </button>
      <div class="success-msg" id="success-msg" role="alert" aria-live="polite" tabindex="-1"></div>
    </div>

  </div><!-- /panel-form -->

  <!-- ==================== RIGHT: PREVIEW ==================== -->
  <div class="panel-preview" aria-label="Live preview">
    <div class="preview-toolbar">
      <span class="preview-toolbar__label">Live Preview</span>
      <button type="button" class="btn-refresh" id="btn-refresh">↻ Refresh</button>
    </div>
    <iframe id="preview-frame"
            title="Live preview of the generated outage page"
            aria-label="Generated page preview"></iframe>
  </div>

</div><!-- /app-layout -->

<script>
// ============================================================
// UTILITIES
// ============================================================
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escAttr(s) {
  return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

function formatDateTime(raw) {
  if (!raw) return '[Date not set]';
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  return d.toLocaleString('en-US', {
    month: 'long', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true,
  });
}

// ============================================================
// STATE
// ============================================================
const DEFAULT_LINKS = [
  { label: 'Student Email',               desc: 'Access your @student.palomar.edu Microsoft Outlook email',    url: 'https://outlook.com/student.palomar.edu', checked: true },
  { label: 'Employee Email',              desc: 'Access your @palomar.edu Microsoft Outlook email',            url: 'https://outlook.com/palomar.edu',         checked: true },
  { label: 'MyPalomar',                   desc: 'Student portal: registration, financial aid, student records', url: 'https://mypalomar.palomar.edu',            checked: true },
  { label: 'Canvas (LMS)',                desc: 'Access your courses, assignments, and grades',                url: 'https://palomar.instructure.com',          checked: true },
  { label: 'Palomar College Help Center', desc: 'Submit a help request or get technical support',              url: 'https://help.palomar.edu/',                checked: true },
  { label: 'Single Sign-On',              desc: 'Palomar Single Sign-On portal',                               url: 'https://myapps.microsoft.com/',            checked: true },
];

let links = DEFAULT_LINKS.map(l => ({ ...l }));
let customLinks = [];

const STATUS_DEFAULTS = {
  'active-outage': {
    headline: 'Website Temporarily Unavailable',
    message:  'We are aware of an issue affecting palomar.edu and are working to restore service. Essential resources are available below.',
    showRestoration: true,
  },
  'scheduled-maintenance': {
    headline: 'Scheduled Maintenance in Progress',
    message:  'palomar.edu is currently undergoing scheduled maintenance. We expect service to be restored by [TIME].',
    showRestoration: true,
  },
  'service-restored': {
    headline: 'Service Restored',
    message:  'palomar.edu has been restored and is fully operational. Thank you for your patience.',
    showRestoration: false,
  },
};

// ============================================================
// STATUS TYPE CHANGE
// ============================================================
function onStatusTypeChange() {
  const type = document.querySelector('input[name="status-type"]:checked').value;
  const defs = STATUS_DEFAULTS[type];

  const headlineEl = document.getElementById('status-headline');
  const messageEl  = document.getElementById('status-message');
  const currentH   = headlineEl.value;
  const currentM   = messageEl.value;

  // Auto-update only if the current value is still one of the built-in defaults
  const allHeadlines = Object.values(STATUS_DEFAULTS).map(d => d.headline);
  const allMessages  = Object.values(STATUS_DEFAULTS).map(d => d.message);
  if (allHeadlines.includes(currentH)) headlineEl.value = defs.headline;
  if (allMessages.includes(currentM))  messageEl.value  = defs.message;

  document.getElementById('restoration-group')
    .classList.toggle('visible', defs.showRestoration);

  debouncedUpdate();
}

// ============================================================
// QUICK LINKS LIST
// ============================================================
function renderLinksList() {
  const container = document.getElementById('quick-links-list');
  container.innerHTML = '';

  links.forEach((link, i) => {
    const item = document.createElement('div');
    item.className = 'checkbox-item';
    item.innerHTML =
      `<input type="checkbox" id="link-${i}" ${link.checked ? 'checked' : ''}
              aria-label="${escAttr(link.label)}">` +
      `<label for="link-${i}">${escHtml(link.label)}</label>`;
    item.querySelector('input').addEventListener('change', function () {
      links[i].checked = this.checked;
      debouncedUpdate();
    });
    container.appendChild(item);
  });

  customLinks.forEach((link, i) => {
    const item = document.createElement('div');
    item.className = 'checkbox-item';
    item.innerHTML =
      `<input type="checkbox" id="custom-${i}" ${link.checked ? 'checked' : ''}
              aria-label="${escAttr(link.label)}">` +
      `<label for="custom-${i}">${escHtml(link.label)}` +
        `<span style="color:#aaa;font-size:0.78rem;margin-left:0.3rem;">(${escHtml(link.url)})</span></label>` +
      `<button type="button" class="link-remove-btn" aria-label="Remove ${escAttr(link.label)}">✕</button>`;
    item.querySelector('input').addEventListener('change', function () {
      customLinks[i].checked = this.checked;
      debouncedUpdate();
    });
    item.querySelector('.link-remove-btn').addEventListener('click', () => {
      customLinks.splice(i, 1);
      renderLinksList();
      debouncedUpdate();
    });
    container.appendChild(item);
  });
}

function addCustomLink() {
  const label = document.getElementById('new-label').value.trim();
  const url   = document.getElementById('new-url').value.trim();
  const desc  = document.getElementById('new-desc').value.trim();

  if (!label || !url) {
    alert('Please enter both a Label and a URL for the custom link.');
    return;
  }

  customLinks.push({ label, url, desc, checked: true });
  document.getElementById('new-label').value = '';
  document.getElementById('new-url').value   = '';
  document.getElementById('new-desc').value  = '';

  renderLinksList();
  debouncedUpdate();
}

// ============================================================
// FORM VALUES
// ============================================================
function getValues() {
  return {
    statusType:      document.querySelector('input[name="status-type"]:checked').value,
    headline:        document.getElementById('status-headline').value,
    message:         document.getElementById('status-message').value,
    lastUpdatedRaw:  document.getElementById('last-updated').value,
    contactLine:     document.getElementById('contact-line').value,
    restorationTime: document.getElementById('restoration-time').value,
    pageTitle:       document.getElementById('page-title').value,
    footerNote:      document.getElementById('footer-note').value,
    showLocations:  document.getElementById('show-locations').checked,
    showContact:    document.getElementById('show-contact').checked,
    helpCenterUrl:  document.getElementById('help-center-url').value,
  };
}

// ============================================================
// HTML GENERATION
// ============================================================
const BANNER = {
  'active-outage': {
    icon: '⚠', role: 'alert',
    headerBg: '#e9171f', headerFg: '#ffffff',
    bodyBg:   '#fff3cd', border:    '#e9171f',
    tsBg:     '#5a3000', msgFg:     '#1a1a1a',
  },
  'scheduled-maintenance': {
    icon: '🔧', role: 'alert',
    headerBg: '#92400e', headerFg: '#fef3c7',

function generateHTML() {
  const v = getValues();
  const bc = BANNER[v.statusType];
  const checkedLinks = [...links, ...customLinks].filter(l => l.checked);
  const dateStr = formatDateTime(v.lastUpdatedRaw);
  const showRestoration = STATUS_DEFAULTS[v.statusType].showRestoration;

  const etaLine = (showRestoration && v.restorationTime)
    ? `          <p class="status-banner__eta"><strong>Estimated Restoration:</strong> ${escHtml(v.restorationTime)}</p>\n`

  const linksHTML = checkedLinks.map(l => `

  const quickLinksSection = checkedLinks.length > 0 ? `

        </li>

          <span class="location-name">Escondido Education Center</span>

        </li>

        </li>
      </ul>
      <p class="locations-note">Campus maps and additional location details will be available at www.palomar.edu/about/locations/ when the main site is restored.</p>

  return `<!DOCTYPE html>

// ============================================================
// PREVIEW
// ============================================================
function updatePreview() {
  document.getElementById('preview-frame').srcdoc = generateHTML();
}

const debouncedUpdate = debounce(updatePreview, 300);

// ============================================================
// DOWNLOAD
// ============================================================
function downloadHTML() {
  const html = generateHTML();
  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = 'index.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showSuccess('✓ Downloaded! Push index.html to your GitHub repo to deploy.');
}

// ============================================================
// COPY HTML
// ============================================================
async function copyHTML() {
  const html = generateHTML();
  try {
    await navigator.clipboard.writeText(html);
    showSuccess('✓ Copied! HTML is in your clipboard.');
  } catch {
    showSuccess('⚠ Copy failed — use Download instead, or try a different browser.');
  }
}

// ============================================================
// SUCCESS MESSAGE
// ============================================================
function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg;
  el.classList.add('visible');
  el.focus();
  setTimeout(() => el.classList.remove('visible'), 6000);
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // Set last-updated to current date/time
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('last-updated').value =
    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}`;

  // Render links list
  renderLinksList();

  // Show restoration group (active-outage is default)
  document.getElementById('restoration-group').classList.add('visible');

  // Status type radios
  document.querySelectorAll('input[name="status-type"]').forEach(r => {
    r.addEventListener('change', onStatusTypeChange);
  });

  // Add link button
  document.getElementById('btn-add-link').addEventListener('click', addCustomLink);

  // Download / Copy
  document.getElementById('btn-download').addEventListener('click', downloadHTML);
  document.getElementById('btn-copy').addEventListener('click', copyHTML);
  document.getElementById('btn-refresh').addEventListener('click', updatePreview);

  // Live preview on any form change
  document.getElementById('gen-form').addEventListener('input',  debouncedUpdate);
  document.getElementById('gen-form').addEventListener('change', debouncedUpdate);

  // Also allow Enter in the Add Custom Link URL field
  document.getElementById('new-url').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addCustomLink(); }
  });

  // Initial render
  updatePreview();
});
</script>

</body>
</html>
